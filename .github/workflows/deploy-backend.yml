name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: sfm-backend
  REPO: sfm

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project: ${{ secrets.GCP_PROJECT_ID }}

      # Fail fast before wasting time on the Docker build
      - name: Verify Artifact Registry access
        run: |
          gcloud artifacts repositories list \
            --location=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev \
            --project=${{ secrets.GCP_PROJECT_ID }} --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300s \
            --port 8000 \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},CORS_ORIGINS=*" \
            --allow-unauthenticated \
            --quiet

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Backend live at: $URL"
          echo "Set BACKEND_URL=$URL on Vercel for the frontend."
